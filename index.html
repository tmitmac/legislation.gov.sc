<!DOCTYPE html>
<html>
<head>
  <title>Square Country Legislation</title>
</head>

<body>

<h1>Legislation Search PROTOTYPE</h1>

<input id="search" placeholder="Search legislation...">
<button onclick="search()">Search</button>

<div id="results"></div>

<script>
const acts = [
  /* 2020s */
  { number: "SC-2026-01", name: "Electoral Amendment (Online Voting) Act 2026", file: "viewer.html?act=electoral-amendment-(online-voting)-act-2026.txt"},
  { number: "SC-2025-43", name: "Defence Expansion Act 2025", file: "viewer.html?act=defence-expansion-act-2025.txt" },
  { number: "SC-2025-42", name: "Federal Revenue and Tax Reform Act 2025", file: "viewer.html?act=federal-revenue-and-tax-reform-act-2025-version-2.txt" },
  /* 2010s */
  /* 2000s */
  { number: "SC-2006-44", name: "Immigration (Open Arms) Act 2006", file: "viewer.html?act=immigration-(open-arms)-act-2006.txt" },
  /* 1990s */
  /* 1980s */ 
  { number: "SC-1986-33", name: "Electoral Act 1986", file: "viewer.html?act=electoral-act-1986.txt" },
  /* 1970s */
  { number: "SC-1979-12", name: "Statistics Act 1979", file: "viewer.html?act=statistics-act-1979.txt" },
  { number: "SC-1967-29", name: "Decimal Currency Act 1967", file: "viewer.html?act=decimal-currency-act-1967.txt" },




];

function search() {
  const q = document.getElementById("search").value.toLowerCase();
  const results = document.getElementById("results");

  results.innerHTML = "";

  acts
    .filter(a => a.name.toLowerCase().includes(q))
    .forEach(a => {
      const div = document.createElement("div");
      div.innerHTML = `<a href="${a.file}">${a.name}</a>`;
      results.appendChild(div);
    });
}
</script>

</body>
</html>
