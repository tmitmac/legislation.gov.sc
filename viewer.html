<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("act");

let sectionLinks = {};   // ✅ global so everything can access it
let activeId = null;

if (file) {
  loadAct("legislation/" + file);
}

async function loadAct(path) {
  const res = await fetch(path);
  const text = await res.text();

const doc = parseLegislation(text);

updateBadges(doc); // 👈 add this

// update browser tab title
document.title = `${doc.title} | Square Country Legislation`;

// 👇 update header dynamically
document.getElementById("actTitle").textContent = doc.title;

buildSidebar(doc);
document.getElementById("main").innerHTML = renderLegislation(doc);

document.getElementById("actMeta").textContent =
  `(as enacted) | ${doc.actNumber} | Administered by ${doc.agency}`;
}

function parseLegislation(text) {
  const lines = text.split("\n");

  let doc = {
    title: "",
    actNumber: "",
    type: "",
    status: "",
    version: "",
    agency: "",
    dateOfAssent: "",
    commencement: "",
    parts: [],
    schedules: [],
  };

  let currentPart = null;
  let currentSubpart = null;
  let currentSection = null;
  let currentSchedule = null;

  for (let line of lines) {
    line = line.trim();

    if (line.startsWith("TITLE:")) doc.title = line.replace("TITLE:", "").trim();

    else if (line.startsWith("ACTNUMBER:"))
      doc.actNumber = line.replace("ACTNUMBER:", "").trim();

    else if (line.startsWith("AGENCY:"))
      doc.agency = line.replace("AGENCY:", "").trim();

    else if (line.startsWith("DATEOFASSENT:"))
      doc.dateOfAssent = line.replace("DATEOFASSENT:", "").trim();

    else if (line.startsWith("COMMENCEMENT:"))
      doc.commencement = line.replace("COMMENCEMENT:", "").trim();


else if (line.startsWith("TYPE:"))
  doc.type = line.replace("TYPE:", "").trim();

      else if (line.startsWith("STATUS:"))
  doc.status = line.replace("STATUS:", "").trim();

else if (line.startsWith("VERSION:"))
  doc.version = line.replace("VERSION:", "").trim();

    else if (line.startsWith("PARTNUMBER:")) {
    currentPart = {
      number: line.replace("PARTNUMBER:", "").trim(),
      title: "",
      subparts: [],
      sections: []
    };

      currentSubpart = null;
      doc.parts.push(currentPart);
    }

    else if (line.startsWith("PARTTITLE:")) {
      if (currentPart) {
        currentPart.title = line.replace("PARTTITLE:", "").trim();
      }
    }

      else if (line.startsWith("SUBPARTNUMBER:")) {
    currentSubpart = {
      number: line.replace("SUBPARTNUMBER:", "").trim(),
      title: "",
      sections: []
    };

    if (currentPart) {
      currentPart.subparts.push(currentSubpart);
    }
  }

  else if (line.startsWith("SUBPARTTITLE:")) {
    if (currentSubpart) {
      currentSubpart.title =
        line.replace("SUBPARTTITLE:", "").trim();
    }
  }

        else if (line.startsWith("SCHEDULENUMBER:")) {
          currentSchedule = {
            number: line.replace("SCHEDULENUMBER:", "").trim(),
            title: "",
            sections: []
          };

          doc.schedules.push(currentSchedule);

          currentPart = null;
          currentSubpart = null;
        }

        else if (line.startsWith("SCHEDULETITLE:")) {
          if (currentSchedule) {
            currentSchedule.title =
              line.replace("SCHEDULETITLE:", "").trim();
          }
        }

    else if (line.startsWith("SECTION:")) {
      currentSection = {
        number: line.replace("SECTION:", "").trim(),
        heading: "",
        clauses: [],
        footnotes: []
      };

      if (currentSchedule) {
        currentSchedule.sections.push(currentSection);

      } else if (currentSubpart) {
        currentSubpart.sections.push(currentSection);

      } else if (currentPart) {
        currentPart.sections.push(currentSection);
      }
    }

    else if (line.startsWith("HEADING:")) {
      currentSection.heading = line.replace("HEADING:", "").trim();
    }

    else if (/^\d+\./.test(line)) {
      currentSection.clauses.push(line);
    }
    
    /* 👇 ADD THIS BLOCK RIGHT HERE */
else if (line.startsWith("AMENDMENT:")) {
  if (currentSection) {
    currentSection.footnotes.push(
      line.replace("AMENDMENT:", "").trim()
    );
  }
}

    else {
      if (currentSection) currentSection.clauses.push(line);
    }

    
  }

  return doc;
}

function renderSection(section) {
  let html = `<div class="section" id="section-${section.number}">`;

  html += `
    <div class="section-header">
      <div class="section-number">${section.number}</div>
      <div class="section-title">${section.heading}</div>
    </div>
    <div class="section-text">
  `;

  for (const clause of section.clauses) {
    let level = 1;
    if (/^\(\w+\)/.test(clause)) level = 2;
    if (/^\(\([a-z]+\)\)/.test(clause)) level = 3;

    let formatted = clause
      .replace(/^(\d+)\.\s*/, "($1) ")
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

    html += `<div class="clause level-${level}">${formatted}</div>`;
  }

  if (section.footnotes?.length) {
    html += `<div class="footnotes">`;
    section.footnotes.forEach(note => {
      let formattedNote = note.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
      html += `<div class="footnote">${formattedNote}</div>`;
    });
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

function renderLegislation(doc) {

  let html = `
<div class="act-header">

  <div class="act-header-title">
    ${doc.title}
  </div>

  <div class="act-header-details">

    <div class="act-header-row">
      <div class="act-label">Public Act</div>
      <div class="act-value">${doc.actNumber}</div>
    </div>

    <div class="act-header-row">
      <div class="act-label">Date of assent</div>
      <div class="act-value">${doc.dateOfAssent}</div>
    </div>

    <div class="act-header-row">
      <div class="act-label">Commencement</div>
      <div class="act-value">${doc.commencement}</div>
    </div>

  </div>

</div>
`;

for (const part of doc.parts) {
  html += `
    <div class="part">
      <div class="part-number">Part ${part.number}</div>
      <div class="part-title">${part.title}</div>
    </div>
  `;

  // CASE 1: sections directly under part (no subparts)
  for (const section of part.sections) {
    html += renderSection(section);
  }

  // CASE 2: subparts
  for (const subpart of part.subparts) {
    html += `
      <div class="subpart">
        <div class="subpart-title">
          Subpart ${subpart.number}—${subpart.title}
        </div>
      </div>
    `;

    for (const section of subpart.sections) {
      html += renderSection(section);
    }
  }

  
}



  return html;
}

function scrollSectionToMiddle(sectionId) {
  const el = document.querySelector(`#section-${sectionId}`);
  if (!el) return;

  const rect = el.getBoundingClientRect();

  const targetY =
    window.scrollY +
    rect.top -
    (window.innerHeight / 2) +
    (rect.height / 2);

  window.scrollTo({
    top: targetY,
    behavior: "auto"
  });
}

  const sidebar = document.getElementById("sidebar");
  const partFirstSection = {};

  sidebar.innerHTML = `

      <div class="section-name"></div>
      <button id="sidebarCloseBtn" class="sidebar-close">☰</button>

        ?.scrollIntoView({ behavior: "auto" });

    });

    // 🟣 SUBPARTS + THEIR SECTIONS (THIS WAS MISSING)
    part.subparts.forEach(subpart => {

      const subpartEl = document.createElement("div");

            Subpart ${subpart.number}
          </div>
          <div class="section-name">
            ${subpart.title || ""}
          </div>
        `;

      sidebar.appendChild(subpartEl);

      subpart.sections.forEach(sec => {
        if (!partFirstSection[part.number]) {
          partFirstSection[part.number] = sec.number;
        }

        const row = document.createElement("div");
        row.className = "section-link";

        row.innerHTML = `
          <div class="section-code">${sec.number}</div>
          <div class="section-name">${sec.heading}</div>
        `;

        row.onclick = () => {
          scrollSectionToMiddle(sec.number);
          setActive(sec.number);
        };

        sidebar.appendChild(row);
        sectionLinks[sec.number] = row;
      });
    });
  });

  // SCHEDULES
doc.schedules?.forEach(schedule => {

  const scheduleEl =
    document.createElement("div");

  scheduleEl.className =
    "section-link part-link";

  scheduleEl.innerHTML = `
    <div class="section-code">
      Schedule ${schedule.number}
    </div>

    <div class="section-name">
      ${schedule.title}
    </div>
  `;

  scheduleEl.onclick = () => {

      );

      behavior: "auto",
      block: "start"
    });
  };

  sidebar.appendChild(scheduleEl);

  schedule.sections.forEach(sec => {

    const row =
      document.createElement("div");

    row.className =
      "section-link";

    row.innerHTML = `
      <div class="section-code">
        ${sec.number}
      </div>

      <div class="section-name">
        ${sec.heading}
      </div>
    `;

    row.onclick = () => {
      scrollSectionToMiddle(sec.number);
      setActive(sec.number);
    };

    sidebar.appendChild(row);

    sectionLinks[sec.number] = row;

  });

});
}

function setActive(id) {
  document.querySelectorAll(".section-link").forEach(el => {
    el.classList.remove("active");
  });

  const active = sectionLinks[id];

  if (active) {
    active.classList.add("active");
    keepInSidebarView(active);
  }

  activeId = id;

  // 💙 NEW: highlight the part too
  const sectionEl = document.querySelector(`#section-${id}`);
  if (sectionEl) {
    const partBlock = sectionEl.closest(".part");
    
    document.querySelectorAll(".part").forEach(p => {
      p.classList.remove("active-part");
    });

    if (partBlock) {
      partBlock.classList.add("active-part");
    }
  }
}

function keepInSidebarView(el) {
  const container = document.getElementById("sidebar");

  const elTop = el.offsetTop;
  const elBottom = elTop + el.offsetHeight;

  const viewTop = container.scrollTop;
  const viewBottom = viewTop + container.clientHeight;

  if (elTop < viewTop) {
    container.scrollTop = elTop - 20;
  } else if (elBottom > viewBottom) {
    container.scrollTop = elBottom - container.clientHeight + 20;
  }
}

window.addEventListener("scroll", () => {
  const viewportMiddle = window.innerHeight / 2;

  let closestId = null;
  let closestDistance = Infinity;

  document.querySelectorAll(".section").forEach(sec => {
    const rect = sec.getBoundingClientRect();

    const sectionMiddle = rect.top + rect.height / 2;
    const distance = Math.abs(sectionMiddle - viewportMiddle);

    if (distance < closestDistance) {
      closestDistance = distance;
      closestId = sec.id.replace("section-", "");
    }
  });

  if (closestId && closestId !== activeId) {
    setActive(closestId);
  }
});

function updateBadges(doc) {
  const typeEl = document.getElementById("badgeType");
  const statusEl = document.getElementById("badgeStatus");
  const versionEl = document.getElementById("badgeVersion");

  // TYPE
 if (doc.type?.toLowerCase() === "act") {
    typeEl.textContent = "Act";
    typeEl.className = "badge badge-gray";
  } else if (doc.type?.toLowerCase() === "bill") {
    typeEl.textContent = "Bill";
    typeEl.className = "badge badge-gray";
  } else if (doc.type?.toLowerCase() === "secondary") {
    typeEl.textContent = "Secondary Legislation";
    typeEl.className = "badge badge-gray";    
  } else {
    typeEl.textContent = doc.type || "Unknown";
    typeEl.className = "badge badge-gray";
  }

  
  // STATUS (example logic)
  if (doc.status?.toLowerCase() === "in force") {
    statusEl.textContent = "In force";
    statusEl.className = "badge badge-green";
  } else if (doc.status?.toLowerCase() === "repealed") {
    statusEl.textContent = "Repealed";
    statusEl.className = "badge badge-red";
  } else if (doc.status?.toLowerCase() === "not yet in force") {
    statusEl.textContent = "Not yet in force";
    statusEl.className = "badge badge-red";
  } else if (doc.status?.toLowerCase() === "revoked") {
    statusEl.textContent = "Revoked";
    statusEl.className = "badge badge-red";
  } else if (doc.status?.toLowerCase() === "terminated") {
    statusEl.textContent = "Terminated";
    statusEl.className = "badge badge-red";
  } else {
    statusEl.textContent = doc.status || "Unknown";
    statusEl.className = "badge badge-gray";
  }

  // VERSION
  if (doc.version?.toLowerCase() === "latest") {
    versionEl.textContent = "Latest version";
    versionEl.className = "badge badge-green";    
  } 
  else {
    versionEl.textContent = doc.version || "Previous Version";
    versionEl.className = "badge badge-red";
  }
}

let searchMatches = [];
let currentMatch = -1;

function openSearchBox() {
  document.getElementById("searchOverlay").style.display = "block";
  document.getElementById("searchInput").focus();
}

function closeSearchBox() {
  document.getElementById("searchOverlay").style.display = "none";
}

function clearHighlights() {
  document.querySelectorAll(".search-match").forEach(el => {
    el.outerHTML = el.textContent;
  });
}

function highlightMatches(term) {
  clearHighlights();

  if (!term) return;

  const regex = new RegExp(
    term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"),
    "gi"
  );

  document.querySelectorAll(
    ".section-title, .clause, .footnote"
  ).forEach(el => {
    el.innerHTML = el.innerHTML.replace(
      regex,
      match => `<span class="search-match">${match}</span>`
    );
  });
}

function searchContent() {
  const term = document
    .getElementById("searchInput")
    .value
    .trim()
    .toLowerCase();

  searchMatches = [];
  currentMatch = -1;

  clearHighlights();

  if (!term) return;

  highlightMatches(term);

  document.querySelectorAll(".section").forEach(section => {
    if (section.textContent.toLowerCase().includes(term)) {
      searchMatches.push(section);
    }
  });

  document.getElementById("searchCount").textContent =
    `${searchMatches.length} result(s)`;

  if (searchMatches.length) {
    currentMatch = 0;
    goToMatch();
  }
}

function goToMatch() {

  document
    .querySelectorAll(".search-match")
    .forEach(el => el.classList.remove("current-match"));

  if (
    currentMatch < 0 ||
    currentMatch >= searchMatches.length
  ) return;

  const section = searchMatches[currentMatch];

  const firstMatch =
    section.querySelector(".search-match");

  if (firstMatch) {
    firstMatch.classList.add("current-match");
  }

  const rect = section.getBoundingClientRect();

  window.scrollTo({
    top:
      window.scrollY +
      rect.top -
      (window.innerHeight / 2) +
      (rect.height / 2),
    behavior: "smooth"
  });

  document.getElementById("searchCount").textContent =
    `${currentMatch + 1} of ${searchMatches.length}`;
}

function searchNext() {
  const term = document
    .getElementById("searchInput")
    .value
    .trim();

  if (!searchMatches.length) {
    searchContent();
    return;
  }

  currentMatch++;

  if (currentMatch >= searchMatches.length) {
    currentMatch = 0;
  }

  goToMatch();
}

function searchPrevious() {
  const term = document
    .getElementById("searchInput")
    .value
    .trim();

  if (!searchMatches.length) {
    searchContent();
    return;
  }

  currentMatch--;

  if (currentMatch < 0) {
    currentMatch = searchMatches.length - 1;
  }

  goToMatch();
}
