<!DOCTYPE html>
<html>
<head>
  <title>Legislation Viewer</title>

  <style>
body {
  margin: 0;
  font-family: Times;
  padding-top: 140px;
  overflow-y: auto;   /* 👈 SINGLE SCROLL CONTAINER */
}

/* NAVBAR */
.leg-nav {
    font-family: "Inter", "Segoe UI", Arial, sans-serif;
    background: #e8edf3;
    border-bottom: 1px solid #c7d1dc;
    padding: 22px 40px;

    position: sticky;
    top: 0;
    z-index: 1000;

    transition: transform 0.25s ease;
}


.nav-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
}

.brand {
    display: flex;
    align-items: center;
    gap: 18px;
}

.brand-logo {
    height: 70px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.15));
}

.brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.25;
}

.brand-text .maori {
    font-size: 22px;
    font-weight: 600;
    color: #0a1a2a;
}

.brand-text .english {
    font-size: 15px;
    color: #4d5a66;
}

/* LINKS */
.nav-links {
    list-style: none;
    display: flex;
    gap: 42px;
    margin: 0;
    padding: 0;
}

.nav-links a {
    text-decoration: none;
    color: #003366;
    font-weight: 600;
    font-size: 15px;
}

.nav-links a span {
    display: block;
    font-size: 12px;
    color: #5f6a75;
}

/* SEARCH */
.nav-search {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #d3dbe3;
    padding-top: 18px;
}

.search-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
}

.nav-search select,
.nav-search input {
    padding: 10px 12px;
    border: 1px solid #b7c2ce;
    border-radius: 6px;
    font-size: 14px;
}

.nav-search input {
    flex: 1;
}

.search-btn {
    background: #0055cc;
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 6px;
    font-weight: 600;
}

.advanced-search {
    margin-left: 26px;
    font-size: 14px;
    color: #0055cc;
    text-decoration: none;
}

#layout {
  display: flex;
  margin-top: 140px;
  padding-left: 50px;
  align-items: flex-start; /* IMPORTANT */
}


#sidebar {
  width: 380px;
  margin-left: 12px;
  margin-top: 12px;
  margin-bottom: 12px;

  border: 1px solid #c7c7c7;
  padding: 12px;
  font-family: Arial, sans-serif;
  background: #fafafa;

  height: calc(100vh - 180px);  /* 👈 KEY FIX */
  overflow-y: auto;             /* 👈 makes it internal scroll */
  position: sticky;
  top: 160px;
}

html, body {
  height: 100%;
}


/* hidden state */
body.sidebar-hidden #sidebar {
  transform: translateX(-100%);
}

/* expand main when sidebar hidden */
body.sidebar-hidden #layout {
  margin-left: -380px;
}

/* toggle button */
#toggleSidebar {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 999;
  padding: 8px 12px;
  background: #111;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}   
    


/* title */
.sidebar-title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 14px;
}

.act-header {
  text-align: center;
  margin-bottom: 50px;
  padding-bottom: 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.act-header-title {
  font-size: 34px;
  font-weight: 700;
  margin-bottom: 12px;
}

.act-header-meta {
  font-size: 16px;
  color: #444;
  margin-bottom: 20px;
}

.act-header-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  width: 700px;
  margin: 0 auto;
}

.act-header-row {
  display: contents;
}

.act-label {
  text-align: right;
  padding-right: 20px;
  font-weight: 600;
}

.act-value {
  text-align: left;
  padding-left: 20px;
}

.contents-bar {
  display: grid;
  grid-template-columns: 160px 1fr 160px;
  align-items: center;
  line-height: 1;

  width: 700px;
  margin: 30px auto 0 auto;

  background: white;
  border: 1px solid #bbb;
  height: 80px; /* taller */
}

.contents-btn {
  font-family: Times;
  font-size: 16px;
  background: #e7e7e7;
  border: none;
  cursor: pointer;
  text-align: left;
  padding-left: 15px;
}

.contents-title {
  text-align: center;
  font-family: Times;
  font-size: 18px;
  font-weight: bold;
  color: black;
}

.contents-spacer {
  width: 100%;
}

.contents-wrapper {
  width: 700px;
  margin: 30px auto 50px auto;
  text-align: left;
}

.contents-toggle {
  width: 100%;
  padding: 14px 16px;
  font-weight: 700;
  font-family: Times;
  background: white;
  color: black;
  border: 1px solid #bbb;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.contents-box {
  width: 700px;
  margin: 0 auto;
  max-height: 0;
  overflow: hidden;

  border-left: 1px solid #bbb;
  border-right: 1px solid #bbb;
  border-bottom: 1px solid #bbb;

  background: white;

  transition: max-height 0.25s ease;
}

.contents-box.open {
  max-height: 300px;
}

.contents-item {
  padding: 10px 12px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
  font-family: Arial, sans-serif;
}

.contents-item:hover {
  background: #f3f4f6;
}

/* PART block */
.part-block {
  margin-bottom: 10px;
  border: 1px solid #ddd;
  border-radius: 10px;
  overflow: hidden;
  background: white;
}

/* PART header (boldest row) */
.part-header {
  padding: 14px 12px;
  font-weight: 900;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f3f4f6;
  font-size: 15px;
}

.part-header:hover {
  background: #e5e7eb;
}

/* slide-out container */
.section-list {
  display: none;
  border-top: 1px solid #eee;
}

/* expanded state */
.part-block.open .section-list {
  display: block;
}

/* EACH ROW (taller + table-like) */
.section-link {
  display: flex;
  gap: 10px;
  padding: 10px 10px;   /* shorter */
  cursor: pointer;
  font-weight: 600;
  border-bottom: 1px solid #f0f0f0;
  align-items: center;
  min-height: 22px;     /* reduced height */
}

.section-link.active {
  background: #126cd3; 
  color: white;
}

.section-link.active .section-code,
.section-link.active .section-name {
  color: white;
}



/* section number column */
.section-code {
  font-weight: 800;
  min-width: 70px;
  color: #111;
}

/* section title */
.section-name {
  font-weight: 600;
  color: #333;
  line-height: 1.2;
}

/* section number */
.section-code {
  font-weight: 400;
  min-width: 60px;
  color: #126cd3;
  font-size: 14px;
}

/* section title */
.section-name {
  font-weight: 400;
  color: #126cd3;
  font-size: 14px;
}

        #main {
      flex: 1;
      padding: 30px;
    }

    h1 {
  font-size: 28px;
  margin-bottom: 5px;
}

h2 {
  font-size: 22px;
  margin-top: 25px;
}

.part {
  text-align: center;
  margin-top: 40px;
  margin-bottom: 25px;
}

.part-number {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.part-title {
  font-size: 20px;
  font-weight: 700; /* make bold */
  margin-top: 4px;
  color: #333;
}

.section {
  margin-top: 22px;
  padding-top: 10px;
}

.section-header {
  display: flex;
  gap: 16px;
  align-items: baseline;
  margin-bottom: 6px;
  line-height: 2;
}

.section-row {
  display: flex;
  gap: 12px;
  margin: 6px 0;
}

.section-number {
  min-width: 55px;
  font-weight: 700;
  color: #111;
}

.section-title {
  font-size: 18px;   /* bigger than body */
  font-weight: 600;
  color: #111;
}

.section-body {
  flex: 1;
}

.section-text {
  margin-left: 71px;
  font-size: 15px;
  color: #333;
  line-height: 1.25;
}

/* base clause */
.clause {
  margin: 3px 0;
}

/* subclause levels */
.level-1 {
  margin-left: 0px;
}

.level-2 {
  margin-left: 20px;
}

.level-3 {
  margin-left: 40px;
}

  </style>
</head>


<body>

    <nav class="leg-nav">
    <div class="nav-header">
        <div class="brand">
            <img src="coat-of-arms.png" alt="Coat of Arms" class="brand-logo">
            <div class="brand-text">
                <span class="maori">Square Country Legislation</span>
                <span class="english">Legislación del país cuadrado</span>
            </div>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home <span>Hogar</span></a></li>
            <li><a href="#">Browse agencies<span>Buscar agencias</span></a></li>
            <li><a href="#">Learn more<span>Más información</span></a></li>
        </ul>
    </div>

    <div class="nav-search">
        <div class="search-controls">
            <select>
                <option>In force</option>
                <option>Bills</option>
                <option>Not in force</option>
            </select>

            <select>
                <option>Title contains</option>
                <option>Content contains</option>
            </select>

            <input type="text" placeholder="Search in-force Acts and secondary legislation…">
            <button class="search-btn">Search</button>
        </div>

        <a href="#" class="advanced-search">Advanced search</a>
    </div>
</nav>


<div id="layout">
  <div id="sidebar">Loading...</div>
  <div id="main">Select a document</div>
</div>

<button id="toggleSidebar">☰</button>


  <custom-footer></custom-footer>


<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("act");

let sectionLinks = {};   // ✅ global so everything can access it
let activeId = null;

if (file) {
  loadAct("legislation/" + file);
}

async function loadAct(path) {
  const res = await fetch(path);
  const text = await res.text();

  const doc = parseLegislation(text);

  buildSidebar(doc);
  document.getElementById("main").innerHTML = renderLegislation(doc);
}

function parseLegislation(text) {
  const lines = text.split("\n");

  let doc = {
    title: "",
    actNumber: "",
    status: "",
    version: "",
    agency: "",
    dateOfAssent: "",
    commencement: "",
    parts: []
  };

  let currentPart = null;
  let currentSection = null;

  for (let line of lines) {
    line = line.trim();

    if (line.startsWith("TITLE:")) doc.title = line.replace("TITLE:", "").trim();

    else if (line.startsWith("ACTNUMBER:"))
      doc.actNumber = line.replace("ACTNUMBER:", "").trim();

    else if (line.startsWith("AGENCY:"))
      doc.agency = line.replace("AGENCY:", "").trim();

    else if (line.startsWith("DATEOFASSENT:"))
      doc.dateOfAssent = line.replace("DATEOFASSENT:", "").trim();

    else if (line.startsWith("COMMENCEMENT:"))
      doc.commencement = line.replace("COMMENCEMENT:", "").trim();

    else if (line.startsWith("PARTNUMBER:")) {
      currentPart = {
        number: line.replace("PARTNUMBER:", "").trim(),
        title: "",
        sections: []
      };
      doc.parts.push(currentPart);
    }

    else if (line.startsWith("PARTTITLE:")) {
      if (currentPart) {
        currentPart.title = line.replace("PARTTITLE:", "").trim();
      }
    }

    else if (line.startsWith("SECTION:")) {
      currentSection = {
        number: line.replace("SECTION:", "").trim(),
        heading: "",
        clauses: []
      };
      currentPart.sections.push(currentSection);
    }

    else if (line.startsWith("HEADING:")) {
      currentSection.heading = line.replace("HEADING:", "").trim();
    }

    else if (/^\d+\./.test(line)) {
      currentSection.clauses.push(line);
    }

    else {
      if (currentSection) currentSection.clauses.push(line);
    }
  }

  return doc;
}

function renderLegislation(doc) {

  let html = `
<div class="act-header">

  <div class="act-header-title">
    ${doc.title}
  </div>

  <div class="act-header-details">

    <div class="act-header-row">
      <div class="act-label">Public Act</div>
      <div class="act-value">${doc.actNumber}</div>
    </div>

    <div class="act-header-row">
      <div class="act-label">Date of assent</div>
      <div class="act-value">${doc.dateOfAssent}</div>
    </div>

    <div class="act-header-row">
      <div class="act-label">Commencement</div>
      <div class="act-value">${doc.commencement}</div>
    </div>

  </div>

</div>
`;

  for (const part of doc.parts) {
    html += `
      <div class="part">
        <div class="part-number">Part ${part.number}</div>
        <div class="part-title">${part.title}</div>
      </div>
    `;

    for (const section of part.sections) {
      html += `<div class="section" id="section-${section.number}">`;

      html += `
        <div class="section-header">
          <div class="section-number">${section.number}</div>
          <div class="section-title">${section.heading}</div>
        </div>
        <div class="section-text">
      `;

      for (const clause of section.clauses) {
        let level = 1;
        if (/^\(\w+\)/.test(clause)) level = 2;
        if (/^\(\([a-z]+\)\)/.test(clause)) level = 3;

        let formatted = clause
          .replace(/^(\d+)\.\s*/, "($1) ")
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

        html += `<div class="clause level-${level}">${formatted}</div>`;
      }

      html += `</div></div>`;
    }
  }

  return html;
}

function buildSidebar(doc) {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = `<div class="sidebar-title">Contents</div>`;
  sectionLinks = {}; // reset

  doc.parts.forEach(part => {
    const partEl = document.createElement("div");
    partEl.style.padding = "10px 8px";
    partEl.style.fontWeight = "900";
    partEl.style.marginTop = "10px";
    partEl.style.borderTop = "1px solid #ddd";
    partEl.innerText = `Part ${part.number}`;
    sidebar.appendChild(partEl);

    part.sections.forEach(sec => {
      const row = document.createElement("div");
      row.className = "section-link";

      row.innerHTML = `
        <div class="section-code">${sec.number}</div>
        <div class="section-name">${sec.heading}</div>
      `;

      row.onclick = () => {
        document.querySelector(`#section-${sec.number}`)
          ?.scrollIntoView({ behavior: "auto" });

        setActive(sec.number);
      };

      sidebar.appendChild(row);
      sectionLinks[sec.number] = row; // ✅ IMPORTANT FIX
    });
  });
}

function setActive(id) {
  document.querySelectorAll(".section-link").forEach(el => {
    el.classList.remove("active");
  });

  const active = sectionLinks[id];

  if (active) {
    active.classList.add("active");
    keepInSidebarView(active); // 👈 clean internal scroll control
  }

  activeId = id;
}

function keepInSidebarView(el) {
  const container = document.getElementById("sidebar");

  const elTop = el.offsetTop;
  const elBottom = elTop + el.offsetHeight;

  const viewTop = container.scrollTop;
  const viewBottom = viewTop + container.clientHeight;

  if (elTop < viewTop) {
    container.scrollTop = elTop - 20;
  } else if (elBottom > viewBottom) {
    container.scrollTop = elBottom - container.clientHeight + 20;
  }
}

window.addEventListener("scroll", () => {
  let current = null;

  document.querySelectorAll(".section").forEach(sec => {
    const rect = sec.getBoundingClientRect();
    if (rect.top <= 180) current = sec.id.replace("section-", "");
  });

  if (current && current !== activeId) {
    setActive(current);
  }
});

document.getElementById("toggleSidebar").onclick = () => {
  document.body.classList.toggle("sidebar-hidden");
};

function toggleContents() {
  document.getElementById("contents-box").classList.toggle("open");
}


</script>
<script src="components/footer.js"></script>
</body>
</html>
